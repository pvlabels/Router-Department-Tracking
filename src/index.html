<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  :root {
    color-scheme: light;
    --page:           #f9f9f7;
    --surface-1:      #fcfcfb;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --grid:           #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --delta-good:     #006300;
    --delta-bad:      #d03b3b;
    --series-1:       #2a78d6;
    --series-2:       #1baf7a;
    --series-3:       #eda100;
    --series-4:       #4a3aa7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page:           #0d0d0d;
      --surface-1:      #1a1a19;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --grid:           #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --delta-good:     #0ca30c;
      --delta-bad:      #e66767;
      --series-1:       #3987e5;
      --series-2:       #199e70;
      --series-3:       #c98500;
      --series-4:       #9085e9;
    }
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--text-primary);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 20px 16px 48px; }

  header { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  header h1 { font-size: 20px; font-weight: 650; margin: 0; }
  .sub { color: var(--text-secondary); font-size: 13px; }
  .spacer { flex: 1; }
  .updated { color: var(--text-muted); font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--delta-good); }
  .dot.stale { background: var(--text-muted); }
  button.refresh {
    font: inherit; font-size: 13px; padding: 5px 12px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--surface-1);
    color: var(--text-primary); cursor: pointer;
  }
  button.refresh:hover { border-color: var(--baseline); }

  .banner {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 16px; color: var(--text-secondary); display: none;
  }
  .banner.error { display: block; }
  .banner strong { color: var(--text-primary); }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .tile {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px 12px;
  }
  .tile .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .tile .value { font-size: 26px; font-weight: 650; letter-spacing: -0.01em; }
  .tile .note { font-size: 12px; margin-top: 2px; color: var(--text-muted); }

  .card {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 16px;
  }
  .card h2 { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin: 6px 0 10px; }
  .legend .item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .legend .chip { width: 10px; height: 10px; border-radius: 3px; }

  .chartbox { position: relative; }
  .chartbox svg { display: block; width: 100%; height: auto; }
  .tooltip {
    position: absolute; pointer-events: none; display: none; z-index: 5;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    padding: 8px 10px; font-size: 12px; min-width: 150px;
  }
  .tooltip .t-x { color: var(--text-secondary); margin-bottom: 4px; }
  .tooltip .t-row { display: flex; align-items: center; gap: 6px; }
  .tooltip .t-row .chip { width: 8px; height: 8px; border-radius: 2px; flex: none; }
  .tooltip .t-row .name { color: var(--text-secondary); flex: 1; padding-right: 10px; }
  .tooltip .t-row .val { font-variant-numeric: tabular-nums; }
  .tooltip .t-total { border-top: 1px solid var(--grid); margin-top: 4px; padding-top: 4px; }

  .job { margin-bottom: 14px; }
  .job:last-child { margin-bottom: 2px; }
  .job .head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .job .name { font-weight: 600; }
  .job .counts { color: var(--text-secondary); font-size: 13px; }
  .job .meta { color: var(--text-muted); font-size: 12px; margin-left: auto; }
  .bar { height: 8px; border-radius: 4px; background: var(--grid); margin-top: 6px; overflow: hidden; }
  .bar .fill { height: 100%; border-radius: 4px; background: var(--series-1); }

  .tablewrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { text-align: left; padding: 7px 10px; white-space: nowrap; }
  th { color: var(--text-secondary); font-weight: 600; border-bottom: 1px solid var(--baseline); }
  td { border-bottom: 1px solid var(--grid); font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }
  .rowcount { color: var(--text-muted); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Router Department</h1>
    <span class="sub" id="subtitle"></span>
    <span class="spacer"></span>
    <span class="updated"><span class="dot stale" id="livedot"></span><span id="updated">loading…</span></span>
    <button class="refresh" onclick="load()">Refresh</button>
  </header>

  <div class="banner" id="banner"></div>

  <div class="tiles" id="tiles"></div>

  <div class="card" id="progresscard" style="display:none">
    <h2>Active job progress</h2>
    <div id="progresslist"></div>
  </div>

  <div class="card" id="chartcard" style="display:none">
    <h2>Runs per day — last 14 days</h2>
    <div class="legend" id="legend"></div>
    <div class="chartbox" id="chartbox">
      <div class="tooltip" id="tooltip"></div>
    </div>
  </div>

  <div class="card" id="tablecard" style="display:none">
    <h2>Recent runs</h2>
    <div class="tablewrap"><table id="datatable"></table></div>
    <div class="rowcount" id="rowcount"></div>
  </div>
</div>

<script>
var REFRESH_MS = 60000;
var SERIES_COLORS = ['var(--series-1)', 'var(--series-2)', 'var(--series-3)', 'var(--series-4)'];
var state = { runs: [], progress: [] };

/* ---------- data loading ---------- */

function load() {
  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(onData)
      .withFailureHandler(onError)
      .getData();
  } else {
    // Local preview fallback (no Apps Script runtime): mock data.
    onData(mockData());
  }
}

function onData(data) {
  state = data;
  state.runs.forEach(function (r) { r.when = new Date(r.start); });
  document.getElementById('banner').className = 'banner';
  var machines = unique(state.runs.map(function (r) { return r.machine; }).filter(Boolean));
  document.getElementById('subtitle').textContent = machines.length === 1 ? machines[0] : '';
  document.getElementById('updated').textContent = 'updated ' + new Date().toLocaleTimeString();
  document.getElementById('livedot').className = 'dot';
  render();
}

function onError(err) {
  var b = document.getElementById('banner');
  b.className = 'banner error';
  b.innerHTML = '<strong>Could not load data.</strong> ' + escapeHtml(err && err.message || String(err));
  document.getElementById('livedot').className = 'dot stale';
  document.getElementById('updated').textContent = 'load failed';
}

/* ---------- date helpers ---------- */

function dayKey(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}
function pad2(n) { return (n < 10 ? '0' : '') + n; }
function startOfDay(d) { var x = new Date(d); x.setHours(0, 0, 0, 0); return x; }
function mondayOfWeek(d) {
  var x = startOfDay(d);
  x.setDate(x.getDate() - ((x.getDay() + 6) % 7));
  return x;
}
function fmtDur(s) {
  if (s === null || s === undefined) return '—';
  s = Math.round(s);
  var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  if (h > 0) return h + 'h ' + pad2(m) + 'm';
  if (m > 0) return m + 'm ' + pad2(s % 60) + 's';
  return (s % 60) + 's';
}
function fmtDay(d) { return d.toLocaleDateString(undefined, { weekday: 'short', month: 'numeric', day: 'numeric' }); }
function unique(arr) {
  return arr.filter(function (v, i) { return arr.indexOf(v) === i; });
}

/* ---------- render ---------- */

function render() {
  renderTiles();
  renderProgress();
  renderChart();
  renderTable();
}

function renderTiles() {
  var now = new Date();
  var today = startOfDay(now), monday = mondayOfWeek(now);
  var todayRuns = 0, todaySec = 0, weekRuns = 0, weekSec = 0;
  state.runs.forEach(function (r) {
    if (r.when >= monday) { weekRuns++; weekSec += r.seconds; }
    if (r.when >= today) { todayRuns++; todaySec += r.seconds; }
  });

  var tiles = [
    { label: 'Runs today', value: String(todayRuns) },
    { label: 'Machine time today', value: fmtDur(todaySec) },
    { label: 'Runs this week', value: String(weekRuns), note: 'since ' + fmtDay(monday) },
    { label: 'Machine time this week', value: fmtDur(weekSec) }
  ];
  document.getElementById('tiles').innerHTML = tiles.map(function (t) {
    return '<div class="tile"><div class="label">' + escapeHtml(t.label) + '</div>'
      + '<div class="value">' + escapeHtml(t.value) + '</div>'
      + (t.note ? '<div class="note">' + escapeHtml(t.note) + '</div>' : '')
      + '</div>';
  }).join('');
}

function renderProgress() {
  var card = document.getElementById('progresscard');
  var list = document.getElementById('progresslist');
  var jobs = (state.progress || []).filter(function (p) { return p.target; });
  if (jobs.length === 0) { card.style.display = 'none'; return; }
  card.style.display = '';

  list.innerHTML = jobs.map(function (p) {
    var pct = p.pct !== null && p.pct !== undefined ? p.pct : (p.completed / p.target) * 100;
    pct = Math.max(0, Math.min(100, pct));

    // Derive avg/left/finish from the (corrected) run log rather than the
    // sheet's progress tab, whose figures inherit the logger's Total Time bug.
    var stats = jobStats(p.job);
    var remaining = p.target ? Math.max(0, p.target - p.completed) : 0;
    var avg = stats.avgSeconds !== null ? stats.avgSeconds : p.avgSeconds;
    var left = avg !== null ? remaining * avg : p.leftSeconds;
    var finish = '';
    if (remaining === 0) {
      finish = 'complete';
    } else if (stats.runsPerDay) {
      var days = Math.ceil(remaining / stats.runsPerDay);
      var d = new Date();
      while (days > 0) {
        d.setDate(d.getDate() + 1);
        if (d.getDay() !== 0 && d.getDay() !== 6) days--;
      }
      finish = d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    } else if (/^\d{4}-\d{2}-\d{2}T/.test(p.estFinish)) {
      finish = new Date(p.estFinish).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    } else {
      finish = p.estFinish;
    }
    var meta = [];
    if (avg) meta.push('avg run ' + fmtDur(avg));
    if (left) meta.push(fmtDur(left) + ' left');
    if (finish) meta.push(finish === 'complete' ? 'complete' : 'est. finish ' + finish);
    return '<div class="job">'
      + '<div class="head"><span class="name">' + escapeHtml(p.job) + '</span>'
      + '<span class="counts">' + p.completed + ' / ' + p.target + ' runs (' + Math.round(pct) + '%)</span>'
      + '<span class="meta">' + escapeHtml(meta.join(' · ')) + '</span></div>'
      + '<div class="bar"><div class="fill" style="width:' + pct.toFixed(1) + '%"></div></div>'
      + '</div>';
  }).join('');
}

/** Median duration and typical runs-per-active-day for a job, from the log. */
function jobStats(job) {
  var runs = state.runs.filter(function (r) { return r.job === job; });
  if (runs.length === 0) return { avgSeconds: null, runsPerDay: null };
  var secs = runs.map(function (r) { return r.seconds; }).sort(function (a, b) { return a - b; });
  var avgSeconds = secs[Math.floor(secs.length / 2)];
  var perDay = {};
  runs.forEach(function (r) { var k = dayKey(r.when); perDay[k] = (perDay[k] || 0) + 1; });
  var counts = Object.keys(perDay).map(function (k) { return perDay[k]; }).sort(function (a, b) { return a - b; });
  return { avgSeconds: avgSeconds, runsPerDay: counts[Math.floor(counts.length / 2)] };
}

function renderChart() {
  var card = document.getElementById('chartcard');
  var box = document.getElementById('chartbox');
  var old = box.querySelector('svg');
  if (old) old.remove();
  if (state.runs.length === 0) { card.style.display = 'none'; return; }
  card.style.display = '';

  var DAYS = 14;
  var end = startOfDay(new Date());
  var days = [];
  for (var i = DAYS - 1; i >= 0; i--) {
    var d = new Date(end); d.setDate(d.getDate() - i);
    days.push({ date: d, key: dayKey(d), byJob: {}, total: 0 });
  }
  var dayIdx = {};
  days.forEach(function (d, i) { dayIdx[d.key] = i; });

  // Top 3 jobs in the window get their own series (fixed colors); rest fold into Other.
  var windowCounts = {};
  state.runs.forEach(function (r) {
    var k = dayKey(r.when);
    if (k in dayIdx) windowCounts[r.job] = (windowCounts[r.job] || 0) + 1;
  });
  var topJobs = Object.keys(windowCounts)
    .sort(function (a, b) { return windowCounts[b] - windowCounts[a]; })
    .slice(0, 3);
  var seriesNames = topJobs.slice();
  var hasOther = Object.keys(windowCounts).length > topJobs.length;
  if (hasOther) seriesNames.push('Other');

  state.runs.forEach(function (r) {
    var k = dayKey(r.when);
    if (!(k in dayIdx)) return;
    var name = topJobs.indexOf(r.job) >= 0 ? r.job : 'Other';
    var d = days[dayIdx[k]];
    d.byJob[name] = (d.byJob[name] || 0) + 1;
    d.total++;
  });

  // legend (single series needs none — the title carries it)
  var legend = document.getElementById('legend');
  legend.innerHTML = '';
  if (seriesNames.length >= 2) {
    seriesNames.forEach(function (name, i) {
      var el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = '<span class="chip" style="background:' + SERIES_COLORS[i] + '"></span>' + escapeHtml(name);
      legend.appendChild(el);
    });
  }

  var W = 1040, H = 280, padL = 40, padR = 16, padT = 12, padB = 26;
  var plotW = W - padL - padR, plotH = H - padT - padB;
  var maxTotal = Math.max(1, Math.max.apply(null, days.map(function (d) { return d.total; })));
  var tickCount = Math.min(4, maxTotal);
  var yMax = Math.ceil(maxTotal * 1.08 / tickCount) * tickCount;   // even integer ticks
  var y = function (v) { return padT + (1 - v / yMax) * plotH; };
  var slot = plotW / DAYS;
  var barW = Math.min(46, slot * 0.58);

  var svg = svgEl('svg', { viewBox: '0 0 ' + W + ' ' + H });

  // gridlines + integer y ticks (recessive)
  var ticks = Math.min(4, yMax);
  for (var t = 0; t <= ticks; t++) {
    var v = Math.round((t / ticks) * yMax);
    var gy = y(v);
    svg.appendChild(svgEl('line', { x1: padL, x2: W - padR, y1: gy, y2: gy, stroke: 'var(--grid)', 'stroke-width': 1 }));
    var lbl = svgEl('text', { x: padL - 8, y: gy + 4, 'text-anchor': 'end', fill: 'var(--text-muted)', 'font-size': 11 });
    lbl.textContent = v;
    svg.appendChild(lbl);
  }
  svg.appendChild(svgEl('line', { x1: padL, x2: W - padR, y1: y(0), y2: y(0), stroke: 'var(--baseline)', 'stroke-width': 1 }));

  days.forEach(function (d, i) {
    var cx = padL + slot * i + slot / 2;

    // x label every other day
    if (i % 2 === 1 || DAYS < 8) {
      var lbl = svgEl('text', { x: cx, y: H - padB + 18, 'text-anchor': 'middle', fill: 'var(--text-muted)', 'font-size': 11 });
      lbl.textContent = (d.date.getMonth() + 1) + '/' + d.date.getDate();
      svg.appendChild(lbl);
    }

    // stacked segments, bottom-up, 2px surface gap between; rounded top on the topmost
    var stack = seriesNames
      .map(function (name, si) { return { count: d.byJob[name] || 0, color: SERIES_COLORS[si] }; })
      .filter(function (s) { return s.count > 0; });
    var cum = 0;
    stack.forEach(function (s, si) {
      var y0 = y(cum), y1 = y(cum + s.count);
      var top = si === stack.length - 1;
      var gap = si > 0 ? 1 : 0;                     // 2px total gap shared between neighbors
      var hgt = Math.max(1, y0 - y1 - gap - (top ? 0 : 1));
      var yTop = y1 + (top ? 0 : 1);
      var xL = cx - barW / 2;
      if (top) {
        var r = Math.min(4, barW / 2, hgt);
        svg.appendChild(svgEl('path', {
          d: 'M' + xL + ' ' + (yTop + hgt)
            + 'L' + xL + ' ' + (yTop + r)
            + 'Q' + xL + ' ' + yTop + ' ' + (xL + r) + ' ' + yTop
            + 'L' + (xL + barW - r) + ' ' + yTop
            + 'Q' + (xL + barW) + ' ' + yTop + ' ' + (xL + barW) + ' ' + (yTop + r)
            + 'L' + (xL + barW) + ' ' + (yTop + hgt) + 'Z',
          fill: s.color
        }));
      } else {
        svg.appendChild(svgEl('rect', { x: xL, y: yTop, width: barW, height: hgt, fill: s.color }));
      }
      cum += s.count;
    });

    // hover hit area — full column, bigger than the mark
    var hit = svgEl('rect', { x: padL + slot * i, y: padT, width: slot, height: plotH, fill: 'transparent' });
    hit.addEventListener('mousemove', function () { showTooltip(d, seriesNames, cx, W); });
    svg.appendChild(hit);
  });

  svg.addEventListener('mouseleave', function () {
    document.getElementById('tooltip').style.display = 'none';
  });

  box.appendChild(svg);
}

function showTooltip(d, seriesNames, cx, W) {
  var tooltip = document.getElementById('tooltip');
  var box = document.getElementById('chartbox');
  var html = '<div class="t-x">' + escapeHtml(fmtDay(d.date)) + '</div>';
  seriesNames.forEach(function (name, i) {
    var c = d.byJob[name];
    if (!c) return;
    html += '<div class="t-row"><span class="chip" style="background:' + SERIES_COLORS[i] + '"></span>'
      + '<span class="name">' + escapeHtml(name) + '</span><span class="val">' + c + '</span></div>';
  });
  html += '<div class="t-row t-total"><span class="name">Total runs</span><span class="val">' + d.total + '</span></div>';
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  var bx = box.getBoundingClientRect();
  var tx = (cx / W) * bx.width;
  tooltip.style.left = Math.max(0, Math.min(tx + 14, bx.width - tooltip.offsetWidth - 4)) + 'px';
  tooltip.style.top = '8px';
}

function renderTable() {
  var card = document.getElementById('tablecard');
  var table = document.getElementById('datatable');
  if (state.runs.length === 0) { card.style.display = 'none'; return; }
  card.style.display = '';

  var machines = unique(state.runs.map(function (r) { return r.machine; }).filter(Boolean));
  var showMachine = machines.length > 1;
  var MAX = 15;
  var recent = state.runs.slice(-MAX).reverse();

  var heads = ['Date', 'Start', 'Job', 'Run time'].concat(showMachine ? ['Machine'] : []).concat(['Status']);
  var html = '<thead><tr>' + heads.map(function (h) { return '<th>' + h + '</th>'; }).join('') + '</tr></thead><tbody>';
  recent.forEach(function (r) {
    var cells = [
      r.when.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }),
      r.when.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }),
      r.job,
      fmtDur(r.seconds)
    ];
    if (showMachine) cells.push(r.machine);
    cells.push(r.status.replace(/\.$/, ''));
    html += '<tr>' + cells.map(function (c) { return '<td>' + escapeHtml(c) + '</td>'; }).join('') + '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
  document.getElementById('rowcount').textContent =
    'Showing ' + recent.length + ' of ' + state.runs.length + ' runs (newest first, doubles removed)';
}

/* ---------- helpers ---------- */

function svgEl(tag, attrs) {
  var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (var k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (ch) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
  });
}

function mockData() {
  var jobs = ['PS-24x18-18x12.cnc', 'PS-A.cnc', 'TR-7843.cnc', 'CR-0118.cnc', 'PS-24x18-EHOL-FIX.cnc'];
  var runs = [];
  var now = new Date();
  for (var d = 13; d >= 0; d--) {
    var day = new Date(now); day.setDate(day.getDate() - d); day.setHours(7, 0, 0, 0);
    if (day.getDay() === 0 || day.getDay() === 6) continue;
    var n = 6 + ((d * 7) % 8);
    var t = day.getTime();
    for (var i = 0; i < n; i++) {
      var job = jobs[(d + i) % (i % 4 === 3 ? 5 : 2)];
      var secs = 900 + ((d * 131 + i * 977) % 2400);
      t += (secs + 600) * 1000;
      if (d === 0 && new Date(t) > now) break;
      runs.push({
        start: new Date(t).toISOString(),
        job: job,
        seconds: secs,
        machine: 'MultiCam 3-205-R16 (41334)',
        status: 'Job completed.'
      });
    }
  }
  return {
    runs: runs,
    progress: [{
      job: 'PS-24x18-18x12.cnc', target: 96, completed: 41, pct: 43,
      avgSeconds: 2640, leftSeconds: 145200, estFinish: 'Tue, Jul 28'
    }],
    updatedAt: new Date().toISOString()
  };
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
