<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  :root {
    color-scheme: light;
    --page:           #f9f9f7;
    --surface-1:      #fcfcfb;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --grid:           #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --delta-good:     #006300;
    --delta-bad:      #d03b3b;
    --series-1:       #2a78d6;
    --series-2:       #1baf7a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page:           #0d0d0d;
      --surface-1:      #1a1a19;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --grid:           #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --delta-good:     #0ca30c;
      --delta-bad:      #e66767;
      --series-1:       #3987e5;
      --series-2:       #199e70;
    }
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--text-primary);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 20px 16px 48px; }

  header { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  header h1 { font-size: 20px; font-weight: 650; margin: 0; }
  .sub { color: var(--text-secondary); font-size: 13px; }
  .spacer { flex: 1; }
  .updated { color: var(--text-muted); font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--delta-good); }
  .dot.stale { background: var(--text-muted); }
  button.refresh {
    font: inherit; font-size: 13px; padding: 5px 12px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--surface-1);
    color: var(--text-primary); cursor: pointer;
  }
  button.refresh:hover { border-color: var(--baseline); }

  .banner {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 16px; color: var(--text-secondary); display: none;
  }
  .banner.error { display: block; }
  .banner strong { color: var(--text-primary); }

  .card {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; margin-bottom: 16px;
  }
  .card h2 { font-size: 14px; font-weight: 600; margin: 0 0 4px; }

  .jobhead { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .jobhead .name { font-size: 17px; font-weight: 650; }
  .jobhead .counts { color: var(--text-secondary); font-size: 14px; }
  .bar { height: 10px; border-radius: 5px; background: var(--grid); margin: 10px 0 8px; overflow: hidden; }
  .bar .fill { height: 100%; border-radius: 5px; background: var(--series-1); }
  .jobmeta { color: var(--text-muted); font-size: 12.5px; }

  .finish { margin-top: 14px; }
  .finish .label { font-size: 12px; color: var(--text-secondary); }
  .finish .value { font-size: 22px; font-weight: 650; margin-top: 2px; }
  .finish .value .time { color: var(--text-secondary); font-weight: 500; font-size: 16px; }

  .scenarios { margin-top: 12px; border-top: 1px solid var(--grid); padding-top: 10px; }
  .scenarios .title { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .scen { display: flex; align-items: baseline; gap: 10px; padding: 3px 0; font-size: 13.5px; }
  .scen .sname { width: 130px; color: var(--text-secondary); flex: none; }
  .scen .sdate { font-weight: 600; font-variant-numeric: tabular-nums; }
  .scen .ssave { color: var(--delta-good); font-size: 12.5px; }

  .strip { margin-top: 14px; }
  .strip .title { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .strip svg { display: block; width: 100%; height: auto; }

  .done { color: var(--delta-good); font-weight: 650; font-size: 18px; margin-top: 12px; }

  .tablewrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { text-align: left; padding: 7px 10px; white-space: nowrap; }
  th { color: var(--text-secondary); font-weight: 600; border-bottom: 1px solid var(--baseline); }
  td { border-bottom: 1px solid var(--grid); font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }
  .rowcount { color: var(--text-muted); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Router Department</h1>
    <span class="sub" id="subtitle"></span>
    <span class="spacer"></span>
    <span class="updated"><span class="dot stale" id="livedot"></span><span id="updated">loading…</span></span>
    <button class="refresh" onclick="load()">Refresh</button>
  </header>

  <div class="banner" id="banner"></div>

  <div id="jobcards"></div>

  <div class="card" id="tablecard" style="display:none">
    <h2>Recent runs</h2>
    <div class="tablewrap"><table id="datatable"></table></div>
    <div class="rowcount" id="rowcount"></div>
  </div>
</div>

<script>
var REFRESH_MS = 60000;

// Shop schedule: Mon–Fri, 6:00 AM – 5:00 PM.
var WORK_START_HOUR = 6;
var WORK_END_HOUR = 17;
var HOURS_PER_DAY = WORK_END_HOUR - WORK_START_HOUR;

// How many recent active days feed the pace estimate.
var PACE_DAYS = 5;

// Anonymous JSON endpoint, used when this page is hosted outside Apps Script
// (e.g. GitHub Pages). fetch() sends no Google cookies, so Workspace session
// restrictions cannot interfere.
var API_URL = 'https://script.google.com/macros/s/AKfycbyO8LmIzyH1bw-axrpbrB98wsEVYZfCAJExR9vmBLoWcc9-WpvfsIhPW1FZ8Hl1dN1w3g/exec?format=json';

var state = { runs: [], jobs: [] };

/* ---------- data loading ---------- */

function load() {
  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(onData)
      .withFailureHandler(onError)
      .getData();
  } else if (location.protocol.indexOf('http') === 0) {
    fetch(API_URL)
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (data) {
        if (data && data.error) throw new Error(data.error);
        onData(data);
      })
      .catch(onError);
  } else {
    // Local file preview (no Apps Script runtime, no network): mock data.
    onData(mockData());
  }
}

function onData(data) {
  state = data;
  state.runs.forEach(function (r) { r.when = new Date(r.start); });
  document.getElementById('banner').className = 'banner';
  var machines = unique(state.runs.map(function (r) { return r.machine; }).filter(Boolean));
  document.getElementById('subtitle').textContent = machines.length === 1 ? machines[0] : '';
  document.getElementById('updated').textContent = 'updated ' + new Date().toLocaleTimeString();
  document.getElementById('livedot').className = 'dot';
  render();
}

function onError(err) {
  var b = document.getElementById('banner');
  b.className = 'banner error';
  b.innerHTML = '<strong>Could not load data.</strong> ' + escapeHtml(err && err.message || String(err));
  document.getElementById('livedot').className = 'dot stale';
  document.getElementById('updated').textContent = 'load failed';
}

/* ---------- helpers ---------- */

function dayKey(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}
function pad2(n) { return (n < 10 ? '0' : '') + n; }
function startOfDay(d) { var x = new Date(d); x.setHours(0, 0, 0, 0); return x; }
function parseLocalDate(s) {
  var m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? new Date(+m[1], +m[2] - 1, +m[3]) : new Date(s);
}
function fmtDur(s) {
  if (s === null || s === undefined) return '—';
  s = Math.round(s);
  var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  if (h > 0) return h + 'h ' + pad2(m) + 'm';
  if (m > 0) return m + 'm ' + pad2(s % 60) + 's';
  return (s % 60) + 's';
}
function fmtDate(d) { return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }); }
function fmtHour(d) { return d.toLocaleTimeString(undefined, { hour: 'numeric' }); }
function unique(arr) { return arr.filter(function (v, i) { return arr.indexOf(v) === i; }); }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (ch) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
  });
}
function svgEl(tag, attrs) {
  var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (var k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

/* ---------- pace + schedule model ---------- */

/**
 * Pace from past-day info: average runs per ACTIVE day over the last
 * PACE_DAYS days that had at least one run (today excluded — it's partial).
 */
function jobPace(runs) {
  var byDay = {};
  runs.forEach(function (r) {
    var k = dayKey(r.when);
    byDay[k] = (byDay[k] || 0) + 1;
  });
  var todayKey = dayKey(new Date());
  var days = Object.keys(byDay).filter(function (k) { return k !== todayKey; }).sort();
  var recent = days.slice(-PACE_DAYS);
  if (recent.length === 0) return null;
  var total = 0;
  recent.forEach(function (k) { total += byDay[k]; });
  var perDay = total / recent.length;
  return { perDay: perDay, perHour: perDay / HOURS_PER_DAY, sampleDays: recent.length, byDay: byDay };
}

/**
 * Walk the calendar hour-by-hour from now through working shifts
 * (6 AM – 5 PM) and return the datetime the remaining runs finish.
 * includeSat / includeSun add weekend shifts with the same hours.
 */
function simulateFinish(remaining, perHour, includeSat, includeSun) {
  if (!perHour || remaining <= 0) return null;
  var runsLeft = remaining;
  var d = new Date();
  for (var guard = 0; guard < 400; guard++) {
    var dow = d.getDay();
    var isWork = (dow >= 1 && dow <= 5) || (dow === 6 && includeSat) || (dow === 0 && includeSun);
    if (isWork) {
      var shiftStart = new Date(d); shiftStart.setHours(WORK_START_HOUR, 0, 0, 0);
      var shiftEnd = new Date(d); shiftEnd.setHours(WORK_END_HOUR, 0, 0, 0);
      var from = d > shiftStart ? d : shiftStart;
      if (from < shiftEnd) {
        var hours = (shiftEnd - from) / 3600000;
        if (hours * perHour >= runsLeft) {
          return new Date(from.getTime() + (runsLeft / perHour) * 3600000);
        }
        runsLeft -= hours * perHour;
      }
    }
    d = startOfDay(d);
    d.setDate(d.getDate() + 1);
  }
  return null;
}

/* ---------- render ---------- */

function render() {
  renderJobs();
  renderTable();
}

function renderJobs() {
  var host = document.getElementById('jobcards');
  host.innerHTML = '';

  (state.jobs || []).forEach(function (jobCfg) {
    var since = parseLocalDate(jobCfg.startDate || '2000-01-01');
    var runs = state.runs.filter(function (r) {
      return r.job === jobCfg.name && r.when >= since;
    });
    var completed = runs.length;
    var remaining = Math.max(0, (jobCfg.target || 0) - completed);
    var pct = jobCfg.target ? Math.min(100, (completed / jobCfg.target) * 100) : 0;

    var secs = runs.map(function (r) { return r.seconds; }).sort(function (a, b) { return a - b; });
    var medianRun = secs.length ? secs[Math.floor(secs.length / 2)] : null;

    var pace = jobPace(runs);

    var card = document.createElement('div');
    card.className = 'card';

    var html = '<div class="jobhead"><span class="name">' + escapeHtml(jobCfg.name) + '</span>'
      + '<span class="counts">' + completed + ' / ' + jobCfg.target + ' runs · ' + Math.round(pct) + '%</span></div>'
      + '<div class="bar"><div class="fill" style="width:' + pct.toFixed(1) + '%"></div></div>';

    var meta = [remaining + ' runs remaining'];
    if (medianRun) meta.push('typical run ' + fmtDur(medianRun));
    if (pace) meta.push('pace ~' + pace.perDay.toFixed(1) + ' runs/day (last ' + pace.sampleDays + ' working day' + (pace.sampleDays > 1 ? 's' : '') + ')');
    html += '<div class="jobmeta">' + escapeHtml(meta.join(' · ')) + '</div>';

    if (remaining === 0) {
      html += '<div class="done">Complete ✓</div>';
    } else if (!pace) {
      html += '<div class="finish"><div class="label">Estimated finish</div>'
        + '<div class="value">No run history yet</div></div>';
    } else {
      var base = simulateFinish(remaining, pace.perHour, false, false);
      var withSat = simulateFinish(remaining, pace.perHour, true, false);
      var withBoth = simulateFinish(remaining, pace.perHour, true, true);

      if (base) {
        html += '<div class="finish"><div class="label">Estimated finish — normal schedule (Mon–Fri, 6 AM–5 PM)</div>'
          + '<div class="value">' + fmtDate(base) + ' <span class="time">around ' + fmtHour(base) + '</span></div></div>';

        html += '<div class="scenarios"><div class="title">If we add weekend shifts (same 6 AM–5 PM hours):</div>';
        html += scenarioRow('Work Saturdays', withSat, base);
        html += scenarioRow('Work Sat + Sun', withBoth, base);
        html += '</div>';
      }
    }

    card.innerHTML = html;
    card.appendChild(dailyStrip(runs, pace));
    host.appendChild(card);
  });

  if ((state.jobs || []).length === 0) {
    host.innerHTML = '<div class="card"><h2>No jobs configured</h2>'
      + '<div class="jobmeta">Add jobs to CONFIG.JOBS in Code.js (name, target runs, start date) and push.</div></div>';
  }
}

function scenarioRow(label, when, base) {
  if (!when) return '';
  var daysSooner = Math.round((startOfDay(base) - startOfDay(when)) / 86400000);
  var save = daysSooner > 0
    ? '<span class="ssave">' + daysSooner + ' day' + (daysSooner > 1 ? 's' : '') + ' sooner</span>'
    : '<span class="ssave" style="color:var(--text-muted)">no change</span>';
  return '<div class="scen"><span class="sname">' + escapeHtml(label) + '</span>'
    + '<span class="sdate">' + fmtDate(when) + ' <span style="color:var(--text-secondary);font-weight:500">around ' + fmtHour(when) + '</span></span>'
    + save + '</div>';
}

/** Small runs-per-day strip for the last 14 days; weekends get muted labels. */
function dailyStrip(runs, pace) {
  var wrap = document.createElement('div');
  wrap.className = 'strip';
  wrap.innerHTML = '<div class="title">Runs per day — last 14 days</div>';

  var byDay = {};
  runs.forEach(function (r) { var k = dayKey(r.when); byDay[k] = (byDay[k] || 0) + 1; });

  var DAYS = 14, W = 940, H = 90, padB = 16;
  var slot = W / DAYS, barW = Math.min(40, slot * 0.6);
  var days = [];
  var end = startOfDay(new Date());
  for (var i = DAYS - 1; i >= 0; i--) {
    var d = new Date(end); d.setDate(d.getDate() - i);
    days.push({ date: d, count: byDay[dayKey(d)] || 0 });
  }
  var max = Math.max(1, Math.max.apply(null, days.map(function (d) { return d.count; })));

  var svg = svgEl('svg', { viewBox: '0 0 ' + W + ' ' + H });
  svg.appendChild(svgEl('line', { x1: 0, x2: W, y1: H - padB, y2: H - padB, stroke: 'var(--baseline)', 'stroke-width': 1 }));

  days.forEach(function (d, i) {
    var cx = slot * i + slot / 2;
    var isWeekend = d.date.getDay() === 0 || d.date.getDay() === 6;
    if (d.count > 0) {
      var h = Math.max(2, (d.count / max) * (H - padB - 14));
      var y = H - padB - h;
      var r = Math.min(3, barW / 2, h);
      var xL = cx - barW / 2;
      var path = svgEl('path', {
        d: 'M' + xL + ' ' + (y + h) + 'L' + xL + ' ' + (y + r)
          + 'Q' + xL + ' ' + y + ' ' + (xL + r) + ' ' + y
          + 'L' + (xL + barW - r) + ' ' + y
          + 'Q' + (xL + barW) + ' ' + y + ' ' + (xL + barW) + ' ' + (y + r)
          + 'L' + (xL + barW) + ' ' + (y + h) + 'Z',
        fill: isWeekend ? 'var(--series-2)' : 'var(--series-1)'
      });
      var title = svgEl('title', {});
      title.textContent = fmtDate(d.date) + ' — ' + d.count + ' runs';
      path.appendChild(title);
      svg.appendChild(path);
      var lbl = svgEl('text', { x: cx, y: y - 4, 'text-anchor': 'middle', fill: 'var(--text-secondary)', 'font-size': 11 });
      lbl.textContent = d.count;
      svg.appendChild(lbl);
    }
    var xlbl = svgEl('text', {
      x: cx, y: H - 3, 'text-anchor': 'middle',
      fill: isWeekend ? 'var(--grid)' : 'var(--text-muted)', 'font-size': 10
    });
    xlbl.textContent = (d.date.getMonth() + 1) + '/' + d.date.getDate();
    svg.appendChild(xlbl);
  });

  wrap.appendChild(svg);
  return wrap;
}

function renderTable() {
  var card = document.getElementById('tablecard');
  var table = document.getElementById('datatable');
  if (state.runs.length === 0) { card.style.display = 'none'; return; }
  card.style.display = '';

  var MAX = 15;
  var recent = state.runs.slice(-MAX).reverse();
  var heads = ['Date', 'Start', 'Job', 'Run time', 'Status'];
  var html = '<thead><tr>' + heads.map(function (h) { return '<th>' + h + '</th>'; }).join('') + '</tr></thead><tbody>';
  recent.forEach(function (r) {
    var cells = [
      r.when.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }),
      r.when.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }),
      r.job,
      fmtDur(r.seconds),
      r.status.replace(/\.$/, '')
    ];
    html += '<tr>' + cells.map(function (c) { return '<td>' + escapeHtml(c) + '</td>'; }).join('') + '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
  document.getElementById('rowcount').textContent =
    'Showing ' + recent.length + ' of ' + state.runs.length + ' runs (newest first, doubles removed)';
}

/* ---------- local preview mock ---------- */

function mockData() {
  var runs = [];
  var now = new Date();
  var completed = 0;
  for (var d = 12; d >= 0; d--) {
    var day = new Date(now); day.setDate(day.getDate() - d);
    if (day.getDay() === 0 || day.getDay() === 6) continue;
    var t = new Date(day); t.setHours(6, 10, 0, 0);
    var n = 8 + ((d * 3) % 4);
    for (var i = 0; i < n; i++) {
      var secs = 2350 + ((d * 131 + i * 977) % 500);
      t = new Date(t.getTime() + (secs + 420) * 1000);
      if (t > now) break;
      runs.push({
        start: t.toISOString(),
        job: 'PS-24x18-18x12.cnc',
        seconds: secs,
        machine: 'MultiCam 3-205-R16 (41334)',
        status: 'Job completed.'
      });
      completed++;
    }
  }
  return {
    runs: runs,
    jobs: [{ name: 'PS-24x18-18x12.cnc', target: Math.max(96, completed + 54), startDate: dayKey(new Date(now.getTime() - 12 * 86400000)) }],
    updatedAt: new Date().toISOString()
  };
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
