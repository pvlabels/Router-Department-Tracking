name: Deploy to Apps Script

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".clasp.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2

      - name: Write clasp credentials
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push source to Apps Script
        run: clasp push -f

      # Updates the existing web-app deployment in place so its URL never changes.
      # Requires the DEPLOYMENT_ID repository variable (see README). Without it,
      # clasp push still updates the code but the live /exec URL keeps serving
      # the old version until you redeploy manually.
      - name: Redeploy web app
        if: ${{ vars.DEPLOYMENT_ID != '' }}
        run: clasp deploy -i "${{ vars.DEPLOYMENT_ID }}" -d "GitHub ${{ github.sha }}"

  # Publishes the dashboard page to GitHub Pages. Viewers load the page from
  # github.io and it fetches data from the Apps Script JSON endpoint without
  # Google cookies — immune to Workspace session restrictions on script.google.com.
  pages:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          cp src/index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
